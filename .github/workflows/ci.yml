name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pytest

  package:
    name: Build and validate package
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv build
      - run: uvx twine check dist/*
      - name: Validate wheel contents and clean install
        shell: bash
        run: |
          set -euo pipefail
          wheel=$(find dist -name '*.whl' -print -quit)
          test -n "$wheel"
          unzip -l "$wheel" | grep -q 'voluntas/__init__.py'
          ! unzip -l "$wheel" | grep -E '(^|/)(bdi|helper|codex)/'
          python -m venv /tmp/voluntas-package-test
          /tmp/voluntas-package-test/bin/pip install "$wheel"
          cd /tmp
          /tmp/voluntas-package-test/bin/python -c 'from voluntas import BDI, BDIUsageTracker, __version__; from voluntas.schemas import Belief, Desire, Intention; assert __version__ == "0.1.0"; print(BDI, BDIUsageTracker, Belief, Desire, Intention)'
          ! /tmp/voluntas-package-test/bin/python -c 'import bdi'
