name: Release to PyPI

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: voluntas-release
  cancel-in-progress: false

jobs:
  release:
    name: Bump, tag, and publish
    if: >-
      github.event.pull_request.merged == true &&
      (contains(github.event.pull_request.labels.*.name, 'release:patch') ||
       contains(github.event.pull_request.labels.*.name, 'release:minor') ||
       contains(github.event.pull_request.labels.*.name, 'release:major'))
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
      pull-requests: read

    steps:
      - name: Check out the updated default branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Select the release type
        id: release-type
        env:
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          kind="$(python scripts/release.py select-label "$PR_LABELS")"
          echo "kind=$kind" >> "$GITHUB_OUTPUT"

      - name: Bump the version
        id: version
        env:
          RELEASE_KIND: ${{ steps.release-type.outputs.kind }}
        run: |
          version="$(python scripts/release.py bump "$RELEASE_KIND")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Lock and install dependencies
        run: |
          uv lock
          uv sync --locked --group dev

      - name: Run quality checks
        run: |
          uv run ruff check voluntas tests scripts
          uv run pytest

      - name: Build and validate distributions
        run: |
          uv build
          uvx twine check dist/*

      - name: Commit and tag the release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml voluntas/__init__.py uv.lock
          git commit -m "chore(release): v${VERSION} (PR #${PR_NUMBER})"
          git tag -a "v${VERSION}" -m "Voluntas ${VERSION}"
          git push --atomic origin HEAD:main "refs/tags/v${VERSION}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
